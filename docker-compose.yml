services:
    database:
        image: mariadb
        container_name: c-share-database
        restart: always
        environment:
            MARIADB_DATABASE: ${MARIADB_DATABASE}
            MARIADB_USER: ${MARIADB_USER}
            MARIADB_PASSWORD: ${MARIADB_PASSWORD}
            MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
        volumes:
            - c-share-database:/var/lib/mysql:Z
            - c-share-data:/app/upload
            - ./ext/db.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD}"]
            timeout: 20s
            interval: 5s
            retries: 10

    cache:
        image: redis
        container_name: c-share-cache
        restart: always
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - c-share-cache:/data:Z
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            timeout: 20s
            interval: 5s
            retries: 5

    server:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: c-share-server
        restart: always
        volumes:
            - ./config.yaml:/app/config.yaml:ro
        ports:
            - "${SERVER_PORT:-8081}:${SERVER_PORT:-8081}"
        depends_on:
            database:
                condition: service_healthy
            cache:
                condition: service_healthy

    client:
        build:
            context: ./web
            dockerfile: Dockerfile
            args:
                VITE_APP: ${VITE_APP}
                VITE_API: ${VITE_API}
                VITE_SOURCE: ${VITE_SOURCE}
        container_name: c-share-client
        restart: always
        volumes:
            - ./web/.env:/app/.env:ro
        ports:
            - "${CLIENT_PORT:-3001}:3000"
        depends_on:
            - server

volumes:
    c-share-cache:
    c-share-database:
    c-share-data:

networks:
    default:
        name: c-share

